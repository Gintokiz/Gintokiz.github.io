# Nome del processo che apparirà nella tab 'Actions' di GitHub
name: Deploy React Vite App

# Esegue il workflow ad ogni push sul branch 'main'
on:
  push:
    branches: ["main"]
  # Permette di avviare il deploy manualmente dalla tab 'Actions'
  workflow_dispatch:

# Permessi necessari per permettere a GitHub di scrivere nella cartella Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # Primo step: Compilazione (Build)
  build:
    runs-on: ubuntu-latest
    steps:
      # Scarica il codice del tuo repository
      - name: Checkout
        uses: actions/checkout@v4

      # Configura l'ambiente Node.js per far girare React/Vite
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      # Installa le dipendenze (lavorando dentro la cartella 'client')
      - name: Install Dependencies
        run: npm install
        working-directory: ./client

      # Esegue il comando di build di Vite (genera la cartella 'dist')
      - name: Build
        run: npm run build
        working-directory: ./client

      # Carica la cartella 'dist' (il sito pronto) come 'artifact'
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './client/dist'

  # Secondo step: Distribuzione (Deploy)
  deploy:
    needs: build # Attende che il 'build' sia completato correttamente
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Pubblica effettivamente i file caricati su GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
